# Render Blueprint configuration to deploy Database and WebSocket server together
services:
  - type: web
    name: voltaiic-ws
    runtime: node
    buildCommand: npm install --legacy-peer-deps && npx prisma generate
    startCommand: npx tsx server/ws-server.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: voltaiic-db
          property: connectionString
      - key: WS_PORT
        value: 10000
      - key: NODE_ENV
        value: production

databases:
  - name: voltaiic-db
    databaseName: voltaiic
    user: voltaiic_user
    plan: free
